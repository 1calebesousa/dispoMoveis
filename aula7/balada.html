<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balada</title>
</head>
<body>
    <script>
        let idade = Number(prompt(`Digite sua idade:`));

        if (isNaN(idade)) {
            alert(`Erro: Você precisa digitar um número válido para a idade!`);
        } 

        else if (idade >= 18) {
            alert(`Vou dar uma volta em Torres e depois ir no Vala`);
        }

        else if (idade >= 16 && idade < 18) {
            alert(
                `Não posso entrar, mas vou no esquenta\nMeus pais vão me buscar às 23:00`
            );
        }

        else {
            alert(`Que abuso!!\nVou ficar em casa jogando.`);
        }
    </script>
    
</body>
</html>
