<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senha com Tentativas</title>
</head>
<body>
    <script>
        let tentativas = 0;
        const LIMITE = 3;

        while (tentativas < LIMITE) {
            let senha = prompt(
                `tentativa ${tentativas + 1}/ ${LIMITE}: Digite a senha:`
            );
            if (senha === "1234") {
                alert("Senha correta! Acesso concedido.");
                break;
            } else {
                alert("Senha incorreta. Tente novamente.");
                tentativas++;
            }
        }

        if (tentativas === LIMITE) {
            alert("Limite de tentativas atingido. Conta bloqueada! ");
        }
    </script>
    
</body>
</html>
