<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let dia = prompt("Digite um dia da semana:").toLowerCase();
        switch (dia) {
            case "domingo":
                alert("Netflix e relax!");
                break;
            case "segunda":
            case "terça":
            case "quarta":
            case "quinta":
            case "sexta":
                alert("Bora estudar!");
                break;
            case "sábado":
                alert("Sábado é pra resenhar!");
                break;
            default:
                alert("Você digitou algo inválido.");
        }
    </script>
</body>
</html>
