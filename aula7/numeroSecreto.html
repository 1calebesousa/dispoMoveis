<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let numeroSecreto = Math.floor(Math.random() * 100) + 1;
        let tentativas = 0;
        let jogando = true;

        alert("Tente advinhar o número entre 1 e 100!")

        while (jogando) {
            let palpite = Number(prompt("Digite seu palpite:"));
            tentativas++;

            if (palpite === numeroSecreto) {
                jogando = false;
                alert(`Parabéns! Você adivinhou o número secreto em ${tentativas} tentativas.`);
            } else if (palpite < numeroSecreto) {
                alert("O número secreto é maior. Tente novamente.");
            } else {
                alert("O número secreto é menor. Tente novamente.");
            }
        }
    </script>
</body>
</html>
