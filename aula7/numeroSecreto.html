<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Número Secreto</title>
</head>
<body>
    <script>
        let numeroSecreto = Math.floor(Math.random() * 100) + 1;
        let tentativas = 0;
        let jogando = true;

        alert("Tente adivinhar o número secreto entre 1 e 100!");

        while (jogando) {
            let palpite = number(prompt("Digite seu palpite:"));
            tentativas++;

            if (palpite === numeroSecreto) {
                alert(`Parabéns! Você acertou o número secreto em ${tentativas} tentativas!`);
                jogando = false;
            } else if (palpite < numeroSecreto) {
                alert("O número secreto é maior. Tente novamente!");
            } else {
                alert("O número secreto é menor. Tente novamente!");
            }
        }
    </script>
    
</body>
</html>
