<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let fezLicao = prompt("Você fez a lição de casa? (sim/não)").toLowerCase();

        if (fezLicao === "sim") {
            alert("Parabéns! Você está se preparando bem para a prova.");
        } else if (fezLicao === "não") {
            alert("É importante fazer a lição de casa para entender melhor o conteúdo.");
        } else {
            alert("Resposta inválida. Por favor, responda com 'sim' ou 'não'.");
        }
    </script>
</body>
</html>
