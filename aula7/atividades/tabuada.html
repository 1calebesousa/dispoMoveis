<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let numero = window.prompt("Digite um número para ver a tabuada de multiplicação:")
        for (let i = 1; i <= 10; i++) {
            document.write(`${numero} x ${i} = ${numero * i}<br>`)
        }
    </script>
</body>
</html>
