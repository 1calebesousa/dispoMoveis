<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        pais = window.prompt(`Digite o nome do seu país de origem:`)
        
        if (pais == "Brasil" || pais == "brasil") {
            window.alert("Você é brasileiro!")
        } else if (pais == "Rússia" || pais == "russia") {
            window.alert("Você é russo!")
        } else if (pais == "Espanha" || pais == "espanha") {
            window.alert("Você é espanhol!")
        } else if (pais == "Itália" || pais == "italia") {
            window.alert("Você é italiano!")
        } else if (pais == "Noruega" || pais == "noruega") {
            window.alert("Você é norueguês!")
        } else {
            window.alert("Você digitou algo errado")
        } 

    </script>
</body>
</html>
