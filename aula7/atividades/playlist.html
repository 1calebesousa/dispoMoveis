<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let escolha = "0";
        let playlist;

        while(escolha !== "fim"){
            let escolha = window.prompt(`Escreva o nome da música que deseja adicionar a playlist, caso deseje sair digite "fim"`)
            playlist += escolha
        }
        window.alert{`Sua playlist tem as músicas: ${playlist}`}
    </script>
</body>
</html>
