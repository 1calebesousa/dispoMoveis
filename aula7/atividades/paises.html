<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let pais = window.prompt(`
        Digite o número de acordo com seu país de origem:
        1 - Brasil
        2 - Rússia 
        3 - Esapanha 
        4 - Itália
        5 - Noruega`)

        if (pais == 1) {
            window.alert("Você escolheu o Brasil!")
        } else if (pais == 2) {
            window.alert("Você escolheu a Rússia!")
        } else if (pais == 3) {
            window.alert("Você escolheu a Espanha!")
        } else if (pais == 4) {
            window.alert("Você escolheu a Itália!")
        } else if (pais == 5) {
            window.alert("Você escolheu a Noruega!")
        } else {
            window.alert("Número inválido!")
        }

    </script>
</body>
</html>
